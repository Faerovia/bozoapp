name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: bozoapp_test
          POSTGRES_USER: bozoapp
          POSTGRES_PASSWORD: bozoapp_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      # Redis pro slowapi rate limiter a progressive-delay counter. V default
      # testech je ENVIRONMENT=test → rate limit disabled (jinak by prorazil
      # limit 5/h registrací). Redis service je tu pro specifické integration
      # testy, které limiter explicitně re-enable.
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      # Runtime: bozoapp_app (least-privilege). Role vzniká při migraci 015.
      DATABASE_URL: postgresql+asyncpg://bozoapp_app:bozoapp_app_dev_secret@localhost:5432/bozoapp_test
      # Alembic (DDL): bozoapp (owner).
      MIGRATION_DATABASE_URL: postgresql+asyncpg://bozoapp:bozoapp_secret@localhost:5432/bozoapp_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-used-in-production
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -v
