services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bozoapp_dev
      POSTGRES_USER: bozoapp
      POSTGRES_PASSWORD: bozoapp_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bozoapp -d bozoapp_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      # Persistentní storage pro PDF školení + loga firem (commit 11a).
      # V produkci synchronizovat na S3 (Hetzner Object Storage).
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Runtime: app se připojuje jako bozoapp_app (least-privilege, subject to RLS).
      # Role se vytvoří migrací 015 při prvním `alembic upgrade head`.
      DATABASE_URL: postgresql+asyncpg://bozoapp_app:bozoapp_app_dev_secret@db:5432/bozoapp_dev
      # Alembic (DDL): jako owner bozoapp. Fallback na DATABASE_URL když není set.
      MIGRATION_DATABASE_URL: postgresql+asyncpg://bozoapp:bozoapp_secret@db:5432/bozoapp_dev
      REDIS_URL: redis://redis:6379/0
      # Subdomain config — viz docs/SUBDOMAIN.md
      # *.localhost:3000 funguje v Chrome/Firefox (RFC 6761). Safari může
      # vyžadovat /etc/hosts override.
      BASE_DOMAIN: ".localhost"
      COOKIE_DOMAIN: ""
      APP_URL_SCHEME: "http"
      APP_URL_PORT: ":3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Server-side proxy target — uvnitř docker networku `backend` hostname.
      BACKEND_INTERNAL_URL: http://backend:8000
      # Browser-side URL (aktuálně nevyužíváno, všechno jde přes Next.js proxy).
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Subdomain config — klient extrahuje tenant slug ze subdomény.
      NEXT_PUBLIC_BASE_DOMAIN: ".localhost"
      NEXT_PUBLIC_APP_URL_SCHEME: "http"
      NEXT_PUBLIC_APP_URL_PORT: ":3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
